name: rssbot # you probably want to 'snapcraft register <name>'
base: core18 # the base snap is the execution environment for this snap
version: '0.1' # just for humans, typically '1.2+git' or '1.3.2'
summary: 'IRC bot you can use to display RSS feeds in your chanel.'
description: |
 RSSBOT is in the Public Domain and contains no copyright or LICENSE.

 1) rssbot <server> <channel> <nick> 
 2) !rss <feedurl>
 3) !fetch

 | Bart Thate (bthate@dds.nl, thatebart@gmail.com)
 | botfather on #dunkbots irc.freenode.net

grade: devel # must be 'stable' to release into candidate/stable channels
confinement: devmode # use 'strict' once you have the right plugs and slots

parts:
  rssbot:
    # See 'snapcraft plugins'
    plugin: nil
